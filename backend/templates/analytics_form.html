{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Analytics | NexusSocial{% endblock %}
{% block page_title %}{% if editing %}Edit Analytics{% else %}New Analytics{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Platform</label>
        <input type="text" name="platform" value="{{ record.platform|default:'' }}">
      </div>
      <div class="form-group">
        <label>Metric</label>
        <input type="text" name="metric" value="{{ record.metric|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Period</label>
        <select name="period">
          <option value="daily" {% if record.period == 'daily' %}selected{% endif %}>Daily</option>
          <option value="weekly" {% if record.period == 'weekly' %}selected{% endif %}>Weekly</option>
          <option value="monthly" {% if record.period == 'monthly' %}selected{% endif %}>Monthly</option>
        </select>
      </div>
      <div class="form-group">
        <label>Value</label>
        <input type="number" step="0.01" name="value" value="{{ record.value|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Change Percent</label>
        <input type="number" step="0.01" name="change_percent" value="{{ record.change_percent|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Analytics</button>
      <a href="/analyticses/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
