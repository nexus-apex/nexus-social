{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ScheduledPost | NexusSocial{% endblock %}
{% block page_title %}{% if editing %}Edit ScheduledPost{% else %}New ScheduledPost{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Platform</label>
        <input type="text" name="platform" value="{{ record.platform|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea name="content">{{ record.content|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Scheduled Date</label>
        <input type="date" name="scheduled_date" value="{{ record.scheduled_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="published" {% if record.status == 'published' %}selected{% endif %}>Published</option>
          <option value="failed" {% if record.status == 'failed' %}selected{% endif %}>Failed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Likes</label>
        <input type="number" name="likes" value="{{ record.likes|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Shares</label>
        <input type="number" name="shares" value="{{ record.shares|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ScheduledPost</button>
      <a href="/scheduledposts/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
